<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Converter & Scaler</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Lato', sans-serif; background: #fdfaf6; color: #333; }
h1 { font-family: 'Playfair Display', serif; }
.container { max-width: 900px; margin: auto; padding: 20px; }
.section { margin-bottom: 25px; }
textarea { width: 100%; height: 150px; padding: 10px; }
input { padding: 8px; width: 48%; }
button { padding: 10px; background: #e67e22; border: none; color: white; cursor: pointer; margin-top: 10px; }
button:hover { background: #cf711f; }
.output { margin-top: 20px; padding: 15px; border: 1px solid #ccc; display:none; }
.highlight { color: green; font-weight: bold; }
@media(max-width:600px){ input { width: 100%; margin-bottom: 10px; } }
</style>
</head>

<body>
<div class="container">
<h1>Recipe Converter & Scaler</h1>
<p>Instantly scale any recipe up or down to match your serving needs.</p>

<div class="section">
<h3>How to Use</h3>
<ol>
<li>Paste your recipe or upload screenshot</li>
<li>Enter servings</li>
<li>Click Convert & Scale</li>
</ol>
</div>

<div class="section">
<label>Recipe</label>
<textarea id="recipe"></textarea>

<label>Upload Screenshot</label>
<input type="file" id="recipeImage" accept="image/*">
<button id="readImage">Read Screenshot</button>
<div id="ocrStatus"></div>

<label>Original Servings</label>
<input type="number" id="original" min="1">

<label>Desired Servings</label>
<input type="number" id="desired" min="1">

<div id="error" style="color:red;"></div>

<button id="convert">Convert & Scale</button>
<button id="clear">Clear</button>
</div>

<div class="output" id="output"></div>
<button id="copy" style="display:none;">Copy</button>
</div>

<script>
function parseFraction(str){
  if(str.includes(" ")){
    let parts = str.split(" ");
    return parseFloat(parts[0]) + eval(parts[1]);
  }
  if(str.includes("/")) return eval(str);
  return parseFloat(str);
}

function toFraction(num){
  if(num === 0.5) return "1/2";
  if(num === 0.25) return "1/4";
  if(num === 0.75) return "3/4";
  return num.toFixed(2);
}

function scaleRecipe(text, orig, desired){
  let factor = desired / orig;
  let found = false;
  let result = text.replace(/(\d+(\s\d+\/\d+)?|\d+\/\d+)/g, (match)=>{
    found = true;
    let val = parseFraction(match);
    let scaled = val * factor;
    return `<span class="highlight">${toFraction(scaled)}</span>`;
  });
  if(!found) return null;
  return result;
}

function showError(msg){ document.getElementById("error").innerText = msg; }
function clearError(){ document.getElementById("error").innerText = ""; }

document.getElementById("convert").addEventListener("click", ()=>{
  clearError();
  let recipe = document.getElementById("recipe").value;
  let orig = document.getElementById("original").value;
  let desired = document.getElementById("desired").value;

  if(!recipe) return showError("Please paste or type your recipe first");
  if(!orig || orig <= 0) return showError("Enter original servings");
  if(!desired || desired <= 0) return showError("Enter desired servings");

  let scaled = scaleRecipe(recipe, orig, desired);
  if(!scaled) return showError("No ingredient amounts found");

  let output = document.getElementById("output");
  output.innerHTML = `<h3>Servings: ${desired}</h3><pre>${scaled}</pre>`;
  output.style.display = "block";
  document.getElementById("copy").style.display = "inline-block";
});

document.getElementById("copy").addEventListener("click", ()=>{
  let text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  let btn = document.getElementById("copy");
  btn.innerText = "Copied!";
  setTimeout(()=>btn.innerText="Copy",2000);
});

document.getElementById("clear").addEventListener("click", ()=>{
  document.getElementById("recipe").value = "";
  document.getElementById("original").value = "";
  document.getElementById("desired").value = "";
  document.getElementById("output").style.display = "none";
});

document.getElementById("readImage").addEventListener("click", async () => {
  const imageInput = document.getElementById("recipeImage");
  const status = document.getElementById("ocrStatus");

  if (!imageInput.files.length) {
    status.innerText = "Please upload a screenshot first";
    return;
  }

  status.innerText = "Reading screenshot...";

  try {
    const result = await Tesseract.recognize(imageInput.files[0], "eng");
    const extractedText = result.data.text.trim();

    if (!extractedText) {
      status.innerText = "Could not read text. Try a clearer image.";
      return;
    }

    document.getElementById("recipe").value = extractedText;
    status.innerText = "Screenshot read successfully";

  } catch {
    status.innerText = "OCR failed. Try another image.";
  }
});
</script>
</body>
</html>
